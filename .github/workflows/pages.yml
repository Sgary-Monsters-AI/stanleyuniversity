name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build member data from Feishu
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BASE_TOKEN: X1dVbdCW3aS8Vss4o8kcxahWnGe
          FEISHU_TABLE_ID: tblqNbOpO4Pqdfag
          FEISHU_VIEW_ID: vewEwDrIqE
        run: |
          if [ -z "$FEISHU_APP_ID" ] || [ -z "$FEISHU_APP_SECRET" ]; then
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "::warning::FEISHU_APP_ID / FEISHU_APP_SECRET are not configured; publishing committed data/members.json for this push."
              exit 0
            fi
            echo "::error::FEISHU_APP_ID / FEISHU_APP_SECRET are not configured, so scheduled Feishu sync cannot run."
            echo "::error::Configure both repository secrets or the site will keep serving the last committed data/members.json."
            exit 1
          fi
          node scripts/build-members-data.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - id: deployment
        uses: actions/deploy-pages@v4
