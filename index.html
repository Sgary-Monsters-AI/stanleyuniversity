<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="0; url=reports/">
  <link rel="canonical" href="https://stanleyuniversity.garylau.ai/reports/">
  <title>正在跳转 - Stanley商学院日报</title>
  <style>
    :root {
      --ink: #1f2933;
      --paper: #fbfaf6;
      --line: #ded8cd;
      --navy: #102a43;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(16,42,67,.045) 1px, transparent 1px),
        linear-gradient(180deg, rgba(16,42,67,.035) 1px, transparent 1px),
        var(--paper);
      background-size: 36px 36px;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(520px, 100%);
      padding: 30px;
      border: 1px solid var(--line);
      background: #fff;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      color: var(--navy);
      font-size: 26px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: #657083;
      line-height: 1.7;
    }

    a {
      color: var(--navy);
      font-weight: 780;
      text-decoration: none;
    }
  </style>
  <script>
    window.location.replace("reports/" + window.location.search + window.location.hash);
  </script>
</head>
<body>
  <main>
    <h1>正在进入日报归档</h1>
    <p>首页暂不展示，自动跳转到 Stanley商学院日报归档。</p>
    <a href="reports/">打开日报归档</a>
  </main>
</body>
</html>
