<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stanley商学院成员分布</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../assets/maplibre-gl.css">
  <style>
    :root {
      --bg: #fafaf8;
      --bg-sidebar: #f0eeea;
      --bg-hover: #e8e5df;
      --bg-elev: #ffffff;
      --border: #e2e0db;
      --border-strong: #d4d2cd;
      --text: #2e2e2e;
      --text-dim: #767572;
      --text-faint: #9b9a97;
      --accent: #7c5cff;
      --green: #4a9d5a;
      --amber: #d4901a;
      --red: #ef5445;
      --empty: rgba(255, 250, 243, 0.36);
      --empty-border: rgba(232, 208, 204, 0.78);
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: grid;
      grid-template-rows: 40px 58px 1fr;
    }

    .titlebar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .traffic { display: flex; gap: 8px; }
    .traffic span {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
    }
    .traffic .r { background: #ff5f57; }
    .traffic .y { background: #ffbd2e; }
    .traffic .g { background: #28c840; }

    .window-title {
      color: #64625e;
      font-size: 15px;
      font-weight: 800;
    }

    .app-header {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto minmax(220px, 1fr);
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-sidebar);
    }

    h1 {
      justify-self: start;
      margin: 0;
      font-size: 17px;
      font-weight: 850;
      letter-spacing: -0.01em;
    }

    .header-actions {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .sync-status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      max-width: 230px;
      min-height: 30px;
      padding: 5px 9px;
      border: 1px solid rgba(74, 157, 90, 0.18);
      border-radius: 999px;
      color: var(--text-dim);
      background: rgba(255,255,255,0.62);
      font-size: 11px;
      font-weight: 780;
      white-space: nowrap;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }

    .sync-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(74, 157, 90, 0.12);
      flex-shrink: 0;
    }

    .sync-status span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .view-mode-toggle {
      justify-self: center;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-elev);
      box-shadow: var(--shadow);
    }

    button {
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 5px 10px;
      color: var(--text);
      background: transparent;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.12s;
    }

    button:hover {
      border-color: var(--border-strong);
      background: var(--bg-hover);
    }

    button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .view-btn {
      min-width: 86px;
      border: 0;
      color: var(--text-dim);
      font-weight: 750;
    }

    .view-btn.active {
      color: var(--text);
      background: #f8f7ff;
      box-shadow: inset 0 0 0 1px rgba(124, 92, 255, 0.12);
    }

    .view-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 20px;
      margin-left: 6px;
      padding: 0 6px;
      border-radius: 999px;
      color: var(--text-faint);
      background: #f3f1ef;
      font-size: 12px;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .view-btn.active .view-count {
      color: var(--accent);
      background: #eee9ff;
    }

    .mode-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      margin-right: 6px;
      border-radius: 50%;
      vertical-align: middle;
    }
    .dot-red { background: var(--red); }
    .dot-amber { background: var(--amber); }
    .dot-green { background: var(--green); }

    .app-main {
      min-height: 0;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr) 390px;
      overflow: hidden;
    }

    .place-tree,
    .data-panel {
      min-width: 0;
      background: var(--bg-sidebar);
      overflow: hidden;
    }

    .place-tree {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    .data-panel {
      display: grid;
      grid-template-rows: auto 1fr;
      border-left: 1px solid var(--border);
    }

    .tree-header,
    .data-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 40px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text-faint);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .tree-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px 8px 18px;
    }

    .tree-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 46px;
      margin: 0 0 4px;
      padding: 6px 8px;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--text);
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .tree-row:hover,
    .tree-row.active { background: var(--bg-hover); }

    .tree-row.active {
      border-color: rgba(124, 92, 255, 0.18);
      color: var(--accent);
    }

    .tree-item {
      margin-bottom: 4px;
      border-radius: 7px;
    }

    .tree-item.expanded {
      background: rgba(255, 255, 255, 0.58);
      box-shadow: inset 0 0 0 1px rgba(226, 224, 219, 0.82), 0 8px 18px rgba(83, 78, 68, 0.06);
    }

    .tree-item .tree-row {
      margin-bottom: 0;
    }

    .tree-item.expanded .tree-row {
      margin-bottom: 8px;
    }

    .expand-icon {
      width: 14px;
      color: var(--text-faint);
      font-size: 10px;
      line-height: 1;
      transform: rotate(0deg);
      transition: transform 0.12s ease;
    }

    .tree-item.expanded .expand-icon {
      transform: rotate(90deg);
    }

    .student-list {
      display: grid;
      gap: 8px;
      min-width: 0;
      padding: 0 10px 12px 40px;
    }

    .student-chip {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 2px;
      justify-self: start;
      width: 100%;
      min-height: 44px;
      padding: 7px 9px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: linear-gradient(180deg, rgba(255,255,255,0.86), rgba(250,250,248,0.72));
      color: var(--text-dim);
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
      overflow: hidden;
    }

    .student-chip strong,
    .student-chip span {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .student-chip strong {
      color: var(--text);
      font-size: 12px;
      font-weight: 850;
    }

    .student-chip span {
      color: var(--text-faint);
      font-size: 11px;
      font-weight: 700;
    }

    .leaf-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tree-label { min-width: 0; flex: 1; }

    .tree-label strong {
      display: block;
      overflow: hidden;
      font-size: 13px;
      font-weight: 850;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tree-label span {
      display: block;
      margin-top: 2px;
      overflow: hidden;
      color: var(--text-faint);
      font-size: 11px;
      font-weight: 650;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-transform: none;
      letter-spacing: 0;
    }

    .tree-badge {
      flex-shrink: 0;
      min-width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-faint);
      background: var(--bg);
      font-size: 11px;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .map-wrap {
      position: relative;
      min-width: 0;
      min-height: 0;
      background: radial-gradient(ellipse at center, #f5f3ee 0%, #e2dfd8 100%);
    }

    #map {
      position: absolute;
      inset: 0;
    }

    .maplibregl-ctrl-top-right { top: 16px; right: 16px; }
    .maplibregl-ctrl-group {
      overflow: hidden;
      border-radius: 7px;
      box-shadow: var(--shadow);
    }
    .maplibregl-ctrl button {
      width: 38px;
      height: 38px;
      border-radius: 0;
    }
    .maplibregl-canvas { cursor: grab; }
    .maplibregl-canvas:active { cursor: grabbing; }

    .map-label {
      pointer-events: none;
    }

    .map-label-card {
      min-width: 42px;
      color: #30302d;
      text-align: center;
      font-weight: 900;
      line-height: 1.05;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.9),
        0 -1px 0 rgba(255,255,255,0.72),
        1px 0 0 rgba(255,255,255,0.78),
        -1px 0 0 rgba(255,255,255,0.78),
        0 2px 4px rgba(70, 58, 48, 0.18);
      transform: translateY(-1px) scale(var(--label-scale, 1));
      transform-origin: center;
    }

    .map-label-card strong,
    .map-label-card span {
      display: block;
      white-space: nowrap;
    }

    .map-label-card strong {
      max-width: 54px;
      overflow: hidden;
      font-size: 12px;
      text-overflow: ellipsis;
    }

    .map-label-card span {
      margin-top: 1px;
      color: rgba(54, 54, 51, 0.82);
      font-size: 10px;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .loading {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 2;
      max-width: 430px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      background: rgba(250, 250, 248, 0.9);
      box-shadow: var(--shadow);
      font-size: 12px;
      font-weight: 650;
      line-height: 1.5;
      backdrop-filter: blur(12px);
    }

    .data-body {
      overflow-y: auto;
      padding: 18px 14px;
    }

    .summary-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-elev);
      box-shadow: 0 1px 2px rgba(0,0,0,0.03), 0 10px 22px rgba(83, 78, 68, 0.05);
    }

    .pie-card {
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-elev);
      box-shadow: 0 1px 2px rgba(0,0,0,0.03), 0 10px 22px rgba(83, 78, 68, 0.05);
    }

    .pie {
      width: 142px;
      height: 142px;
      border-radius: 50%;
      background: conic-gradient(#d8d5cf 0 100%);
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
    }

    .pie-caption {
      margin-top: 8px;
      color: var(--text-faint);
      font-size: 11px;
      font-weight: 800;
      text-align: center;
    }

    .pie-legend {
      display: grid;
      gap: 6px;
      max-height: 190px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .legend-row {
      display: grid;
      grid-template-columns: 10px minmax(0, 1fr) 28px 42px;
      gap: 8px;
      align-items: center;
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 760;
    }

    .legend-row i {
      width: 9px;
      height: 9px;
      border-radius: 50%;
    }

    .legend-row strong {
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .legend-row em {
      color: var(--text-faint);
      font-style: normal;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .summary-card {
      margin-top: 14px;
      padding: 12px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .metric {
      min-width: 0;
      padding: 9px 8px;
      border-radius: 7px;
      background: var(--bg);
    }

    .metric strong {
      display: block;
      font-size: 23px;
      line-height: 1;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .metric span {
      display: block;
      margin-top: 6px;
      color: var(--text-faint);
      font-size: 11px;
      font-weight: 750;
      white-space: nowrap;
    }

    .note-list {
      margin: 14px 0 0;
      padding: 0;
      display: grid;
      gap: 8px;
      list-style: none;
    }

    .note-list li {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 760;
    }

    .note-list small {
      color: var(--text-faint);
      font-size: 11px;
      font-weight: 700;
      text-align: right;
    }

    .form-card {
      margin-top: 14px;
      padding: 13px;
      border: 1px solid rgba(124, 92, 255, 0.14);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(248,247,255,0.78), rgba(255,255,255,0.92));
      box-shadow: 0 1px 2px rgba(0,0,0,0.03), 0 10px 22px rgba(83, 78, 68, 0.05);
    }

    .form-card h2 {
      margin: 0;
      color: var(--text);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .form-card p {
      margin: 6px 0 12px;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 650;
      line-height: 1.5;
    }

    .form-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
      min-height: 36px;
      padding: 8px 10px;
      border: 1px solid rgba(124, 92, 255, 0.2);
      border-radius: 7px;
      color: var(--accent);
      background: rgba(255,255,255,0.72);
      font-size: 12px;
      font-weight: 850;
      text-decoration: none;
      transition: background 0.12s ease, border-color 0.12s ease, transform 0.12s ease;
    }

    .form-link:hover {
      border-color: rgba(124, 92, 255, 0.36);
      background: #fff;
      transform: translateY(-1px);
    }

    .form-link:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .tooltip {
      position: fixed;
      z-index: 10;
      min-width: 154px;
      padding: 9px 11px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255,255,255,0.96);
      box-shadow: var(--shadow);
      pointer-events: none;
      transform: translate(-50%, calc(-100% - 14px));
    }

    .tooltip b {
      display: block;
      margin-bottom: 3px;
      font-size: 13px;
    }

    .tooltip span {
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 650;
    }

    .hidden { display: none; }

    @media (max-width: 980px) {
      html, body {
        height: auto;
        overflow: auto;
      }
      body { display: block; }
      .app-header {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .view-mode-toggle {
        justify-self: stretch;
        overflow-x: auto;
      }
      .view-btn {
        min-width: 76px;
        white-space: nowrap;
      }
      .header-actions { justify-self: start; }
      .app-main {
        grid-template-columns: 1fr;
        overflow: visible;
      }
      .map-wrap {
        order: -1;
        height: 62vh;
        min-height: 460px;
      }
      .place-tree,
      .data-panel {
        min-height: 280px;
        border: 0;
      }
    }

    @media (max-width: 680px) {
      body { background: var(--bg-sidebar); }
      .titlebar {
        height: 34px;
        padding: 0 12px;
      }
      .traffic span {
        width: 11px;
        height: 11px;
      }
      .window-title {
        font-size: 13px;
      }
      .app-header {
        padding: 10px 12px;
      }
      h1 {
        font-size: 16px;
        line-height: 1.25;
      }
      .view-mode-toggle {
        width: 100%;
        padding: 3px;
      }
      .view-btn {
        min-width: 72px;
        padding: 6px 8px;
        font-size: 12px;
      }
      .header-actions {
        width: 100%;
        justify-content: space-between;
      }
      .header-actions button {
        min-width: 96px;
        min-height: 34px;
      }
      .sync-status {
        max-width: calc(100% - 106px);
      }
      .map-wrap {
        height: 56svh;
        min-height: 340px;
      }
      .maplibregl-ctrl-top-right {
        top: 10px;
        right: 10px;
      }
      .maplibregl-ctrl button {
        width: 34px;
        height: 34px;
      }
      .loading {
        left: 10px;
        right: 10px;
        bottom: 10px;
        max-width: none;
        font-size: 11px;
      }
      .tree-body {
        max-height: 420px;
        padding: 8px 8px 14px;
      }
      .tree-row {
        min-height: 50px;
        padding: 7px 8px;
      }
      .student-list {
        grid-template-columns: 1fr;
        padding: 0 10px 12px 34px;
      }
      .data-body {
        padding: 12px;
      }
      .pie-card {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .pie {
        margin: 0 auto;
      }
      .pie-legend {
        max-height: 240px;
      }
      .summary-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .metric {
        padding: 9px 6px;
      }
      .metric strong {
        font-size: 22px;
      }
      .metric span {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <header class="titlebar" aria-label="窗口栏">
    <div class="traffic" aria-hidden="true"><span class="r"></span><span class="y"></span><span class="g"></span></div>
    <div class="window-title">Stanley商学院成员分布</div>
  </header>

  <header class="app-header">
    <h1>🌍 Stanley商学院成员分布</h1>
    <div class="view-mode-toggle" aria-label="人数筛选">
      <button class="view-btn active" type="button" data-filter="all">全部 <span class="view-count">16</span></button>
      <button class="view-btn" type="button" data-filter="3"><span class="mode-dot dot-red"></span>3人 <span class="view-count">2</span></button>
      <button class="view-btn" type="button" data-filter="2"><span class="mode-dot dot-amber"></span>2人 <span class="view-count">2</span></button>
      <button class="view-btn" type="button" data-filter="1"><span class="mode-dot dot-green"></span>1人 <span class="view-count">12</span></button>
    </div>
    <div class="header-actions">
      <div class="sync-status" id="syncStatus"><span class="sync-dot"></span><span>等待数据同步</span></div>
      <button type="button" id="resetView">重置视图</button>
    </div>
  </header>

  <main class="app-main">
    <aside class="place-tree" aria-label="已填色地点">
      <div class="tree-header"><span>已填色地点</span><span id="visibleCount">16</span></div>
      <div class="tree-body" id="cityList"></div>
    </aside>

    <section class="map-wrap" aria-label="可旋转城市区块地球仪">
      <div id="map"></div>
      <div id="loading" class="loading">正在加载离线地球仪与城市行政区块。底图、国内市级边界和海外城市行政边界均从本站静态文件读取。</div>
    </section>

    <aside class="data-panel" aria-label="数据概览">
      <div class="data-header"><span>Data</span><span>城市分布</span></div>
      <div class="data-body">
        <div class="pie-card" aria-label="城市成员比例扇形饼图">
          <div>
            <div class="pie" id="cityPie"></div>
            <div class="pie-caption">42 位成员</div>
          </div>
          <div class="pie-legend" id="cityPieLegend"></div>
        </div>

    const chinaCountByName = new Map();

    const green = getComputedStyle(document.documentElement).getPropertyValue("--green").trim();
    const pieColors = [

    function colorFor(count) {
      if (count >= 3) return red;
      if (count === 2) return amber;
      return green;
    }

    function rows() {
      return PLACE_ROWS.filter((row) => filter === "all" || row.count === Number(filter));
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function normalizeStudent(student) {
      if (typeof student === "string") {
        return { registeredName: student, wechatName: student };
      }
      const registeredName = student?.registeredName || student?.name || student?.wechatName || "未命名成员";
      const wechatName = student?.wechatName || registeredName;
      return { registeredName, wechatName };
    }

    function studentChip(student) {
      const item = normalizeStudent(student);
      const sameName = item.registeredName === item.wechatName;
      const wechatLine = sameName ? "微信同名" : `微信：${item.wechatName}`;
      return `
        <span class="student-chip" title="${escapeHtml(`${item.registeredName} / ${item.wechatName}`)}">
          <strong>${escapeHtml(item.registeredName)}</strong>
          <span>${escapeHtml(wechatLine)}</span>
        </span>
      `;
    }

    function showTip(title, count, note, x, y) {
      tooltip.innerHTML = `<b>${title}</b><span>${count ? `${count} 人` : "暂无学生"}${note ? ` · ${note}` : ""}</span>`;
      tooltip.style.left = `${x}px`;
      tooltip.style.top = `${y}px`;
      tooltip.classList.remove("hidden");
    }

    function hideTip() {
      tooltip.classList.add("hidden");
    }

    function rebuildLookups() {
      chinaCountByName.clear();
      chinaLabelByName.clear();
      for (const row of PLACE_ROWS) {
        for (const name of row.chinaNames || []) {
          chinaCountByName.set(name, row.count);
          chinaLabelByName.set(name, row.label);
        }
      }
    }

    function updateSummary() {
      document.querySelector(".pie-caption").textContent = `${TOTAL_MEMBERS} 位成员`;
      const updatedAt = DATA_UPDATED_AT ? new Date(DATA_UPDATED_AT) : null;
      const updatedText = updatedAt && !Number.isNaN(updatedAt.valueOf())
        ? `飞书同步 ${updatedAt.toLocaleString("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" })}`
        : "等待数据同步";
      syncStatus.querySelector("span:last-child").textContent = updatedText;
      document.getElementById("totalMembersMetric").textContent = TOTAL_MEMBERS;
      document.getElementById("filledCityMetric").textContent = FILLED_CITY_RECORDS;
      document.getElementById("placeCountMetric").textContent = PLACE_ROWS.length;
      document.getElementById("locatedMembersMetric").textContent = LOCATED_MEMBERS;
      document.getElementById("provinceOnlyMetric").textContent = PROVINCE_ONLY_MEMBERS;
      document.getElementById("excludedDualCityMetric").textContent = EXCLUDED_DUAL_CITY_MEMBERS;
      document.getElementById("unrecordedMetric").textContent = UNRECORDED_MEMBERS;
      const counts = { all: PLACE_ROWS.length, 1: 0, 2: 0, 3: 0 };
      for (const row of PLACE_ROWS) {
        if (row.count >= 3) counts[3] += 1;
        else if (row.count === 2) counts[2] += 1;
        else counts[1] += 1;
      }
      filterButtons.forEach((button) => {
        button.querySelector(".view-count").textContent = counts[button.dataset.filter] ?? 0;
      });
    }

    function refreshRenderedData() {
      rebuildLookups();
      updateSummary();
      renderCityPie();
      renderList();
      applyLayerFilters();
    }

    function applyMemberData(data) {
      if (!data || !Array.isArray(data.placeRows)) return;
      PLACE_ROWS = data.placeRows;
      TOTAL_MEMBERS = data.totalMembers;
      LOCATED_MEMBERS = data.locatedMembers;
      FILLED_CITY_RECORDS = data.filledCityRecords;
      PROVINCE_ONLY_MEMBERS = data.provinceOnlyMembers;
      EXCLUDED_DUAL_CITY_MEMBERS = data.excludedDualCityMembers || 0;
      UNRECORDED_MEMBERS = data.unrecordedMembers;
      DATA_UPDATED_AT = data.updatedAt || "";
      expandedLabels.clear();
      activeLabel = null;
      refreshRenderedData();
      if (map?.getSource("china-cities") && chinaCityGeo) {
        for (const feature of chinaCityGeo.features) decorateFeature(feature);
        map.getSource("china-cities").setData(chinaCityGeo);
      }
      if (map?.getSource("overseas-city-blocks")) {
        map.getSource("overseas-city-blocks").setData(overseasGeoJson());
      }
      renderMapLabels();
    }

    async function fetchMemberData() {
      const urls = ["../data/members.json", "/api/members"];
      for (const url of urls) {
        try {
          const separator = url.includes("?") ? "&" : "?";
          const response = await fetch(`${url}${separator}v=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
          applyMemberData(await response.json());
          return;
        } catch (error) {
          if (url === urls[urls.length - 1]) {
            console.info("使用内置成员数据；静态成员数据不可用。", error.message);
          }
        }
      }
    }

    function pieSegments() {
      return [
        ...PLACE_ROWS.map((row, index) => ({ label: row.label, count: row.count, color: pieColors[index % pieColors.length] })),
        { label: "省级未落市", count: PROVINCE_ONLY_MEMBERS, color: "#bcb8b0" },
        { label: "双地点未落图", count: EXCLUDED_DUAL_CITY_MEMBERS, color: "#cec8bd" },
        { label: "未记录成员", count: UNRECORDED_MEMBERS, color: "#d8d5cf" }
      ];
    }

    function renderCityPie() {
      let cursor = 0;
      const gradient = [];
      const legend = [];
      for (const segment of pieSegments()) {
        const start = cursor;
        const end = cursor + (segment.count / TOTAL_MEMBERS) * 100;
        gradient.push(`${segment.color} ${start.toFixed(3)}% ${end.toFixed(3)}%`);
        legend.push(`
          <div class="legend-row">
            <i style="background:${segment.color}"></i>
            <span>${segment.label}</span>
            <strong>${segment.count}</strong>
            <em>${((segment.count / TOTAL_MEMBERS) * 100).toFixed(1)}%</em>
          </div>
        `);
        cursor = end;
      }
      cityPie.style.background = `conic-gradient(${gradient.join(", ")})`;
      cityPieLegend.innerHTML = legend.join("");
    }

    function renderList() {
      const visibleRows = rows();
      visibleCount.textContent = visibleRows.length;
      list.innerHTML = visibleRows.map((row) => `
        <div class="tree-item ${expandedLabels.has(row.label) ? "expanded" : ""}">
          <button class="tree-row ${activeLabel === row.label ? "active" : ""}" type="button" data-label="${row.label}" aria-expanded="${expandedLabels.has(row.label)}">
            <span class="expand-icon">▶</span>
            <span class="leaf-dot" style="background:${colorFor(row.count)}"></span>
            <span class="tree-label"><strong>${row.label}</strong><span>${row.note}</span></span>
            <span class="tree-badge">${row.count}</span>
          </button>
          ${expandedLabels.has(row.label) ? `<div class="student-list">${(row.students || []).map(studentChip).join("")}</div>` : ""}
        </div>
      `).join("");

      document.querySelectorAll(".tree-row").forEach((button) => {
        button.addEventListener("click", () => {
          const row = PLACE_ROWS.find((item) => item.label === button.dataset.label);
          if (expandedLabels.has(row.label)) {
            expandedLabels.delete(row.label);
          } else {
            expandedLabels.add(row.label);
          }
          focusRow(row);
        });
      });
    }

    function filteredFeatureExpression() {
      if (filter === "all") return [">", ["get", "studentCount"], 0];
      return ["==", ["get", "studentCount"], Number(filter)];
    }

    function activeExpression() {
      if (!activeLabel) return ["==", ["get", "displayLabel"], "__none__"];
      return ["==", ["get", "displayLabel"], activeLabel];
    }

    function passesCountFilter(count) {
      return filter === "all" || count === Number(filter);

    function applyLayerFilters() {
      if (!map || !map.getLayer("china-filled")) return;
      const expression = filteredFeatureExpression();
      map.setFilter("china-filled", expression);
      map.setFilter("china-active", activeExpression());
      map.setFilter("overseas-filled", expression);
      map.setFilter("overseas-active", activeExpression());
      renderMapLabels();
    }

    function focusRow(row) {
      if (!row || !map) return;
      activeLabel = row.label;
      const zoom = row.overseasId === "sydney" ? 7.75 : (row.overseasId ? 9.4 : 4.9);
      const center = row.overseasId === "sydney" ? [150.76, -33.86] : [row.lng, row.lat];
      const targetZoom = row.overseasId === "sydney" ? 7.05 : zoom;
      map.flyTo({ center, zoom: targetZoom, speed: 1.2, curve: 1.25 });
      renderList();
      applyLayerFilters();
    }

    function labelElement(label, count) {
      const element = document.createElement("div");
      element.className = "map-label";
      element.innerHTML = `<div class="map-label-card"><strong>${label}</strong><span>${count}人</span></div>`;
      return element;
    }

    function updateMapLabelScale() {
      if (!map) return;
      const zoom = map.getZoom();
      const scale = Math.min(1.7, Math.max(0.24, Math.pow(1.45, zoom - 5)));
      map.getContainer().style.setProperty("--label-scale", scale.toFixed(3));
    }

    function clearMapLabels() {
      for (const marker of mapLabelMarkers) marker.remove();
      mapLabelMarkers = [];
    }

    function addMapLabel(label, count, lngLat) {
      if (!map || !lngLat || !passesCountFilter(count)) return;
      const marker = new maplibregl.Marker({ element: labelElement(label, count), anchor: "center" })
        .setLngLat(lngLat)
        .addTo(map);
      mapLabelMarkers.push(marker);
    }

    function renderMapLabels() {
      clearMapLabels();
      if (!map) return;
      updateMapLabelScale();
      if (chinaCityGeo?.features) {
        for (const feature of chinaCityGeo.features) {
          const count = Number(feature.properties.studentCount || 0);
          if (!count) continue;
          const center = feature.properties.centroid || feature.properties.center;
          addMapLabel(feature.properties.displayLabel || feature.properties.name, count, center);
        }
      }
      for (const row of PLACE_ROWS) {
        if (!row.overseasId || !row.count) continue;
        addMapLabel(row.label, row.count, [row.lng, row.lat]);
      }
    }

    function overseasPolygon(id, label, count, note, centerLng, centerLat, dx, dy) {
      const coords = [
        [centerLng - dx * 0.9, centerLat - dy * 0.2],
        [centerLng - dx * 0.35, centerLat + dy * 0.7],
        [centerLng + dx * 0.55, centerLat + dy * 0.55],
        [centerLng + dx, centerLat - dy * 0.18],
        [centerLng + dx * 0.25, centerLat - dy * 0.8],
        [centerLng - dx * 0.65, centerLat - dy * 0.62],
        [centerLng - dx * 0.9, centerLat - dy * 0.2]
      ];
      return {
        type: "Feature",
        geometry: { type: "Polygon", coordinates: [coords] },
        properties: { id, name: label, displayLabel: label, studentCount: count, note, color: colorFor(count) }
      };
    }

    function decorateOverseasFeature(feature) {
      const row = PLACE_ROWS.find((item) => (
        item.overseasId === feature.properties.memberId ||
        item.overseasId === feature.properties.id
      ));
      const count = row?.count || 0;
      return {
        ...feature,
        properties: {
          ...feature.properties,
          displayLabel: row?.label || feature.properties.name,
          studentCount: count,
          note: row?.note || feature.properties.note || "海外市级行政边界",
          color: count ? colorFor(count) : "rgba(255, 250, 243, 0.36)"
        }
      };
    }

    function overseasGeoJson() {
      const source = overseasAdminGeo || OVERSEAS_BOUNDARIES;
      const realFeatures = source.features
        .filter((feature) => ["grid-city", "member-city"].includes(feature.properties.boundaryRole))
        .map(decorateOverseasFeature)
        .filter(Boolean);
      if (realFeatures.length) {
        return { type: "FeatureCollection", features: realFeatures };
      }
      return {
        type: "FeatureCollection",
        features: [
          overseasPolygon("singapore", "新加坡", 1, "海外市级行政边界", 103.8198, 1.3521, 0.55, 0.35),
          overseasPolygon("boston", "波士顿", 1, "海外市级行政边界", -71.0589, 42.3601, 0.34, 0.22),
          overseasPolygon("sydney", "悉尼", 1, "海外市级行政边界", 151.2093, -33.8688, 0.46, 0.3)
        ]
      };
    }

    function overseasRegionGeoJson() {
      const source = overseasAdminGeo || OVERSEAS_BOUNDARIES;
      return {
        type: "FeatureCollection",
        features: source.features.filter((feature) => feature.properties.boundaryRole === "admin-region")
      };
    }

    async function fetchJson(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error(`${response.status} ${url}`);
      return response.json();
    }

    async function loadChinaCityGeo() {
      const data = await fetchJson("../data/china-city-boundaries.json");
      for (const feature of data.features) decorateFeature(feature);
      return data;
    }

    async function loadWorldGeo() {
      return fetchJson("../data/world-countries.geojson");
    }

    async function loadOverseasAdminGeo() {
      return fetchJson("../data/overseas-admin-boundaries.json");
    }

    function decorateFeature(feature) {
      const name = feature.properties.name;
      const count = chinaCountByName.get(name) || 0;
      feature.properties.studentCount = count;
      feature.properties.displayLabel = chinaLabelByName.get(name) || name;
      feature.properties.color = count ? colorFor(count) : "rgba(255, 250, 243, 0.36)";
    }

    function addChoroplethLayers(chinaGeo, worldGeo, overseasGeo) {
      chinaCityGeo = chinaGeo;
      overseasAdminGeo = overseasGeo;
      map.addSource("world-land", { type: "geojson", data: worldGeo });
      map.addSource("china-cities", { type: "geojson", data: chinaGeo });
      map.addSource("overseas-region-boundaries", { type: "geojson", data: overseasRegionGeoJson() });
      map.addSource("overseas-city-blocks", { type: "geojson", data: overseasGeoJson() });

      map.addLayer({
        id: "world-land-fill",
        type: "fill",
        source: "world-land",
        paint: { "fill-color": "#fffaf3", "fill-opacity": 0.92 }
      });
      map.addLayer({
        id: "world-land-lines",
        type: "line",
        source: "world-land",
        paint: { "line-color": "rgba(232, 208, 204, 0.62)", "line-width": 0.45 }
      });
      map.addLayer({
        id: "china-empty",
        type: "fill",
        source: "china-cities",
        paint: { "fill-color": "rgba(255, 250, 243, 0.42)", "fill-opacity": 0.72 }
      });
      map.addLayer({
        id: "china-boundaries",
        type: "line",
        source: "china-cities",
        paint: { "line-color": "rgba(232, 208, 204, 0.86)", "line-width": 0.55 }
      });
      map.addLayer({
        id: "china-filled",
        type: "fill",
        source: "china-cities",
        filter: filteredFeatureExpression(),
        paint: {
          "fill-color": ["get", "color"],
          "fill-opacity": 0.86
        }
      });
      map.addLayer({
        id: "china-active",
        type: "line",
        source: "china-cities",
        filter: activeExpression(),
        paint: { "line-color": "#7c5cff", "line-width": 2.4 }
      });

      map.addLayer({
        id: "overseas-region-lines",
        type: "line",
        source: "overseas-region-boundaries",
        paint: {
          "line-color": "rgba(205, 159, 151, 0.92)",
          "line-width": ["interpolate", ["linear"], ["zoom"], 1, 0.55, 4, 0.75, 7, 1.05],
          "line-opacity": ["interpolate", ["linear"], ["zoom"], 1, 0.72, 4, 0.86, 7, 0.58],
          "line-dasharray": [2, 2]
        }
      });

      map.addLayer({
        id: "overseas-empty",
        type: "fill",
        source: "overseas-city-blocks",
        paint: { "fill-color": "rgba(255, 250, 243, 0.42)", "fill-opacity": 0.75 }
      });
      map.addLayer({
        id: "overseas-filled",
        type: "fill",
        source: "overseas-city-blocks",
        filter: filteredFeatureExpression(),
        paint: { "fill-color": ["get", "color"], "fill-opacity": 0.86 }
      });
      map.addLayer({
        id: "overseas-lines",
        type: "line",
        source: "overseas-city-blocks",
        paint: {
          "line-color": "rgba(214, 174, 168, 0.9)",
          "line-width": ["interpolate", ["linear"], ["zoom"], 1, 0.32, 4, 0.5, 7, 0.85, 10, 1.15],
          "line-opacity": ["interpolate", ["linear"], ["zoom"], 1, 0.08, 4, 0.18, 6, 0.5, 9, 0.88]
        }
      });
      map.addLayer({
        id: "overseas-active",
        type: "line",
        source: "overseas-city-blocks",
        filter: activeExpression(),
        paint: { "line-color": "#7c5cff", "line-width": 2.6 }
      });

      for (const layer of ["china-filled", "overseas-filled"]) {
        map.on("mousemove", layer, (event) => {
          const feature = event.features?.[0];
          if (!feature) return;
          map.getCanvas().style.cursor = "pointer";
          showTip(feature.properties.displayLabel || feature.properties.name, feature.properties.studentCount, feature.properties.note || feature.properties.name, event.originalEvent.clientX, event.originalEvent.clientY);
        });
        map.on("mouseleave", layer, () => {
          map.getCanvas().style.cursor = "";
          hideTip();
        });
        map.on("click", layer, (event) => {
          const feature = event.features?.[0];
          if (!feature) return;
          const label = feature.properties.displayLabel || feature.properties.name;
          const row = PLACE_ROWS.find((item) => item.label === label || (item.chinaNames || []).includes(feature.properties.name));
          if (row) {
            expandedLabels.add(row.label);
            focusRow(row);
          }
        });
      }

      loading.classList.add("hidden");
      applyLayerFilters();
    }

    function initMap() {
      if (!window.maplibregl) {
        loading.textContent = "MapLibre 加载失败，请检查 assets/maplibre-gl.js 是否存在。";
        return;
      }
      map = new maplibregl.Map({
        container: "map",
        style: OFFLINE_STYLE,
        center: [106, 28],
        zoom: 2.35,
        minZoom: 0.9,
        maxZoom: 10,
        attributionControl: false
      });
      window.studentBlockMap = map;
      map.addControl(new maplibregl.NavigationControl({ visualizePitch: false }), "top-right");
      map.on("load", updateMapLabelScale);
      map.on("zoom", updateMapLabelScale);
      map.on("resize", updateMapLabelScale);
      let layersReady = false;
      map.on("style.load", async () => {
        if (layersReady) return;
        layersReady = true;
        map.resize();
        map.setProjection({ type: "globe" });
        try {
          const [chinaGeo, worldGeo, overseasGeo] = await Promise.all([loadChinaCityGeo(), loadWorldGeo(), loadOverseasAdminGeo()]);
          addChoroplethLayers(chinaGeo, worldGeo, overseasGeo);
          requestAnimationFrame(() => {
            map.resize();
            map.triggerRepaint();
          });
        } catch (error) {
          loading.textContent = `城市区块加载失败：${error.message}`;
        }
      });
    }

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        filter = button.dataset.filter;
        activeLabel = null;
        filterButtons.forEach((item) => item.classList.toggle("active", item === button));
        renderList();
        applyLayerFilters();
      });
    });

    document.getElementById("resetView").addEventListener("click", () => {
      filter = "all";
      activeLabel = null;
      filterButtons.forEach((button) => button.classList.toggle("active", button.dataset.filter === "all"));
      renderList();
      applyLayerFilters();
      if (map) map.flyTo({ center: [106, 28], zoom: 2.35, speed: 1.1 });
    });

    refreshRenderedData();
    initMap();
    fetchMemberData();
    setInterval(fetchMemberData, 60000);
  </script>
</body>
</html>
